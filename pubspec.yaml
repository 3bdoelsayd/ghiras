name: ghiras
description: "A new Flutter project."
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  adhan: ^2.0.0+1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  flutter_local_notifications: ^17.0.0
  get_it: ^7.6.7
  go_router: ^14.3.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  timezone: ^0.9.4
  uuid: ^4.3.3
  path_provider: ^2.1.2
  dio: ^5.7.0
  just_audio_background: ^0.0.1-beta.17
  fluttertoast: ^8.2.8
  animate_do: ^3.3.4
  fluttericon: ^2.0.0
  cached_network_image: ^3.4.1
  back_button_interceptor: ^7.0.1
  azlistview: ^2.0.0
  animations: ^2.0.11
  easy_container: ^1.0.4
  flutter_staggered_animations: ^1.1.1
  audio_video_progress_bar: ^2.0.1
  lottie: ^3.1.2



  intl: ^0.19.0
  quran: 1.4.1
  just_audio: ^0.9.36
  audio_session: ^0.1.16
  scrollable_positioned_list: ^0.2.3
  get: ^4.7.3
  screenshot: ^3.0.0
  flutter_screenutil: ^5.9.3
  cupertino_icons: ^1.0.8
  hijri: ^3.0.0
  share_plus: ^10.1.0
  perfect_volume_control: ^1.0.6
  flutter_compass_v2: ^1.0.0
  permission_handler: ^11.0.0
  flutter_colorpicker: ^1.1.0
  flutter_html: ^3.0.0-beta.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpeg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FAF9F6"
  image: assets/images/logo.jpeg
  android_12:
    image: assets/images/logo.jpeg
    color: "#FAF9F6"
  ios: true



